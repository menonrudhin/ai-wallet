<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BankStat AI</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

.card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

h1 {
    margin-top: 0;
    font-size: 22px;
    text-align: center;
    color: #0a2540;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 20px;
}

.upload-box {
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    display: block;
}

.upload-box:hover {
    background: #f1f5f9;
}

.file-count {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-top: 8px;
}

input[type="file"] {
    display: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    background: #0a2540;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #1d3557;
}

.progress {
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
    color: #555;
}

.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 20px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>BankStat AI</h1>
        <div class="subtitle">
            Upload your bank statements and get instant insights
        </div>

        <label class="upload-box">
            Tap to select PDF statements
            <input type="file" id="pdfs" multiple accept="application/pdf">
        </label>

        <p id="fileCount" class="file-count">No files selected</p>

        <button onclick="upload()">Generate Report</button>

        <div class="progress" id="progress"></div>
    </div>

    <div class="footer">
        Secure • No data stored • AI-powered insights
    </div>
</div>

<script>
async function upload() {
    const files = document.getElementById("pdfs").files;
    if (files.length === 0) {
        alert("Please select at least one PDF file.");
        return;
    }

    const formData = new FormData();
    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    document.getElementById("progress").innerText = "Processing...";

    const response = await fetch("https://bankstat.onrender.com/upload", {
        method: "POST",
        body: formData
    });

    // const response = await fetch("http://localhost:8000/upload", {
    //     method: "POST",
    //     body: formData
    // });

    if (!response.ok) {
        document.getElementById("progress").innerText = "Upload failed.";
        return;
    }

    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "report.pdf";
    a.click();

    document.getElementById("progress").innerText = "Report generated!";
}
const fileInput = document.getElementById("pdfs");
const fileCount = document.getElementById("fileCount");

fileInput.addEventListener("change", function() {
    const count = fileInput.files.length;

    if (count === 0) {
        fileCount.textContent = "No files selected";
    } else if (count === 1) {
        fileCount.textContent = "1 PDF selected";
    } else {
        fileCount.textContent = count + " PDFs selected";
    }
});
</script>

</body>
</html>
